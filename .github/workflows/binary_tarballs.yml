# Attach and test the Geant4 binary tarballs produced by the deploy workflow.
name: Geant4 Binary Tarballs

run-name: Triggered by successful deploy workflow

permissions:
  actions: read
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: geant4-binary-tarballs-${{ github.event.workflow_run.id }}
  cancel-in-progress: true

on:
  workflow_run:
    workflows: [ "Deploy Geant4 Images" ]
    types: [ completed ]

jobs:
  release-tarballs:
    if: >-
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_repository.full_name == github.repository
      }}
    name: Attach Geant4 tarballs to dev release
    runs-on: ubuntu-latest
    env:
      TAG_NAME: dev
    steps:
      - name: Download Geant4 tarballs from deploy run
        uses: actions/download-artifact@v7
        with:
          pattern: geant4-tarball-*
          path: ${{ runner.temp }}/geant4-release-artifacts
          merge-multiple: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Upload Geant4 tarballs to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          shopt -s nullglob
          tarballs=("${{ runner.temp }}/geant4-release-artifacts/"*.tar.gz)
          shopt -u nullglob
          if (( ${#tarballs[@]} == 0 )); then
            echo "No Geant4 tarballs found"
            exit 1
          fi
          gh release view "${TAG_NAME}" --repo "$REPO" >/dev/null 2>&1 || \
            gh release create "${TAG_NAME}" \
              --repo "$REPO" \
              --title "Dev Nightly" \
              --prerelease \
              --notes "Geant4 binary tarballs (dev nightly)."
          gh release upload "${TAG_NAME}" --repo "$REPO" "${tarballs[@]}" --clobber

  discover:
    if: >-
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_repository.full_name == github.repository
      }}
    name: Create Job Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix_build: ${{ steps.scan.outputs.matrix_build }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - id: scan
        name: Build matrix
        run: ci/distros_tags.sh

  test-tarball:
    if: ${{ always() && needs.discover.result == 'success' && needs.release-tarballs.result == 'success' }}
    name: ${{ matrix.image }}:${{ matrix.image_tag }} ${{ matrix.arch }}
    needs: [ discover, release-tarballs ]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.discover.outputs.matrix_build) }}
    env:
      TEST_IMAGE: geant4-binary-test:${{ matrix.image }}-${{ matrix.image_tag }}-${{ matrix.arch }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Generate minimal package Dockerfile
        shell: bash
        run: |
          python3 - "${{ matrix.image }}" "${{ matrix.image_tag }}" > Dockerfile.geant4-binary-test <<'PY'
          import sys

          sys.path.insert(0, "ci")
          from binary_packages import map_family, packages_install_command

          image = sys.argv[1]
          tag = sys.argv[2]
          family = map_family(image)

          print(f"FROM {image}:{tag}")
          print('SHELL ["/bin/bash", "-c"]')

          # Repo/bootstrap steps needed for package installation only. This
          # deliberately skips g4install's Geant4/CLHEP/Xerces-C builds.
          if family == "archlinux":
              print("RUN pacman-key --init && pacman-key --populate")
              print("RUN pacman -Sy --noconfirm archlinux-keyring")
          elif image == "almalinux":
              print("RUN dnf install -y 'dnf-command(config-manager)' \\")
              if tag.startswith("9"):
                  # AlmaLinux 9: Qt6 needs CRB + the synergy repo (alma10 ships
                  # qt6 in AppStream, so CRB alone is enough there).
                  print("    && dnf config-manager --set-enabled crb \\")
                  print("    && dnf install -y almalinux-release-synergy")
              else:
                  print("    && dnf config-manager --set-enabled crb")

          print(packages_install_command(image, tag))
          PY
          cat Dockerfile.geant4-binary-test

      - name: Build minimal package image
        shell: bash
        run: |
          docker build \
            --pull \
            --platform "${{ matrix.platform }}" \
            -f Dockerfile.geant4-binary-test \
            -t "${TEST_IMAGE}" \
            .

      - name: Test Geant4 binary tarball installation
        shell: bash
        run: |
          archive="geant4-${{ matrix.geant4_tag }}-${{ matrix.image }}-${{ matrix.image_tag }}-${{ matrix.arch }}.tar.gz"
          url="https://github.com/${{ github.repository }}/releases/download/dev/${archive}"

          docker run --rm \
            --platform "${{ matrix.platform }}" \
            -e GEANT4_TARBALL_URL="${url}" \
            -e GEANT4_TARBALL_ARCHIVE="${archive}" \
            "${TEST_IMAGE}" \
            bash -lc '
              set -euo pipefail
              g4home=/root/geant4
              mkdir -p "$g4home"
              cd "$g4home"
              curl -L -o "$GEANT4_TARBALL_ARCHIVE" "$GEANT4_TARBALL_URL"
              tar -xzf "$GEANT4_TARBALL_ARCHIVE" -C "$g4home" --strip-components=1
              ./install_geant4_data.sh
              source ./geant4.env
              geant4-config --version
              # the Geant4 runtime libraries must resolve with only the minimal packages
              lib="$(ls "$G4INSTALL"/lib*/libG4global.so* 2>/dev/null | head -n1)"
              if [ -n "$lib" ]; then
                echo "Checking runtime dependencies of $lib"
                ldd "$lib"
                if ldd "$lib" | grep -i "not found"; then
                  echo "Missing runtime libraries for $lib" >&2
                  exit 1
                fi
              fi
            '
